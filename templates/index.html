<!DOCTYPE html>
<html>
<head>
    <title>Natural Language Database Interface</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Natural Language Database Interaction</h2>

<form method="POST">
    <input type="text" name="query" placeholder="Enter your query" required>
    <button type="submit">Search</button>
</form>

{% if sql_query %}
    <p><strong>Generated SQL:</strong> {{ sql_query }}</p>
{% endif %}

{% if result is not none %}
    <h3>Result:</h3>
    <pre>{{ result }}</pre>
{% endif %}

</body>
</html>
